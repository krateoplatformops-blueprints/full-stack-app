apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.app.backend.service.type }}
  selector:
    app: {{ .Release.Name }}-backend
  ports:
    - name: http
      port: {{ .Values.app.backend.port }}
      targetPort: {{ .Values.app.backend.port }}
      {{- if eq .Values.app.backend.service.type "NodePort" }}
      nodePort: {{ .Values.app.backend.service.port }}
      {{- end }}
