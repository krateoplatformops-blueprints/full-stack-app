{{- if .Values.app.redis.enabled }}
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
spec:
  kubernetesConfig:
    image: {{ .Values.app.redis.image }}
    imagePullPolicy: IfNotPresent
  redisConfig:
    additionalRedisConfig: {{ .Release.Name }}-redis-config
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.app.redis.storage }}
{{- end }}
