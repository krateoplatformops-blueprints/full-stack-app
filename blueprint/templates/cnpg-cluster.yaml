apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.app.cnpg.instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:{{ .Values.app.cnpg.postgresVersion }}
  storage:
    size: {{ .Values.app.cnpg.storage.size }}
  bootstrap:
    initdb:
      database: {{ .Release.Name }}
      owner: {{ .Release.Name }}
